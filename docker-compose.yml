name: credflow

services:

  # ── Infraestrutura ──────────────────────────────────────────────────────────

  postgres-account:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: credflow
      POSTGRES_PASSWORD: credflow
      POSTGRES_DB: account_service_development
    ports:
      - "5432:5432"
    volumes:
      - pgdata-account:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credflow -d account_service_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: credflow
      POSTGRES_PASSWORD: credflow
      POSTGRES_DB: payment_service_development
    ports:
      - "5433:5432"
    volumes:
      - pgdata-payment:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credflow -d payment_service_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-receivables:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: credflow
      POSTGRES_PASSWORD: credflow
      POSTGRES_DB: receivables_service_development
    ports:
      - "5434:5432"
    volumes:
      - pgdata-receivables:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credflow -d receivables_service_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: credflow
      RABBITMQ_DEFAULT_PASS: credflow
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  # ── Mocks ───────────────────────────────────────────────────────────────────

  kyc-mock:
    build:
      context: mocks/kyc-mock
    ports:
      - "4002:4002"

  spb-mock:
    build:
      context: mocks/spb-mock
    ports:
      - "4001:4001"

  boleto-mock:
    build:
      context: mocks/boleto-mock
    ports:
      - "4003:4003"

  # ── Serviços Rails ──────────────────────────────────────────────────────────

  account-service:
    build:
      context: services/account-service
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://credflow:credflow@postgres-account:5432/account_service_development
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://credflow:credflow@rabbitmq:5672
      KYC_MOCK_URL: http://kyc-mock:4002
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: dev_secret_key_base_account_service_changeme
      DEVISE_JWT_SECRET_KEY: dev_jwt_secret_key_changeme_in_production
    depends_on:
      postgres-account:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/account-service:/app
      - bundle-account:/usr/local/bundle

  payment-service:
    build:
      context: services/payment-service
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://credflow:credflow@postgres-payment:5432/payment_service_development
      REDIS_URL: redis://redis:6379/1
      RABBITMQ_URL: amqp://credflow:credflow@rabbitmq:5672
      SPB_MOCK_URL: http://spb-mock:4001
      ACCOUNT_SERVICE_URL: http://account-service:3000
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: dev_secret_key_base_payment_service_changeme
    depends_on:
      postgres-payment:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/payment-service:/app
      - bundle-payment:/usr/local/bundle

  receivables-service:
    build:
      context: services/receivables-service
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: postgresql://credflow:credflow@postgres-receivables:5432/receivables_service_development
      REDIS_URL: redis://redis:6379/2
      RABBITMQ_URL: amqp://credflow:credflow@rabbitmq:5672
      SPB_MOCK_URL: http://spb-mock:4001
      BOLETO_MOCK_URL: http://boleto-mock:4003
      ACCOUNT_SERVICE_URL: http://account-service:3000
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: dev_secret_key_base_receivables_service_changeme
    depends_on:
      postgres-receivables:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/receivables-service:/app
      - bundle-receivables:/usr/local/bundle

  # ── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    volumes:
      - ./frontend:/app
      - node_modules-frontend:/app/node_modules

  # ── API Gateway ─────────────────────────────────────────────────────────────

  api-gateway:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - account-service
      - payment-service
      - receivables-service

volumes:
  pgdata-account:
  pgdata-payment:
  pgdata-receivables:
  bundle-account:
  bundle-payment:
  bundle-receivables:
  node_modules-frontend:
